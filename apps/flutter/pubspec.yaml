name: bevy_tasks
description: A cross-platform task management app built with Flutter and Rust.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.0.0
  google_fonts: ^6.1.0
  provider: ^6.1.0
  path_provider: ^2.1.0
  file_picker: ^8.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
